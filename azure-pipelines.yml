name: Deploy to Azure with Terraform

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - infra/terraform/**
      - src/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - main
      - develop

variables:
  - name: terraform_version
    value: '1.5.0'
  - name: working_directory
    value: '$(System.DefaultWorkingDirectory)/infra/terraform'
  - name: acr_name
    value: 'acrzavadev'
  - name: docker_image_name
    value: 'zava-storefront'
  - name: app_service_name
    value: 'app-zava-dev'

stages:
  - stage: TerraformValidate
    displayName: 'Validate Terraform Configuration'
    jobs:
      - job: Validate
        displayName: 'Terraform Validate and Plan'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraform_version)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(working_directory)
              backendServiceArm: '$(AZURE_SERVICE_CONNECTION)'
              backendAzureRmResourceGroupName: '$(TF_STATE_RESOURCE_GROUP)'
              backendAzureRmStorageAccountName: '$(TF_STATE_STORAGE_ACCOUNT)'
              backendAzureRmContainerName: '$(TF_STATE_CONTAINER)'
              backendAzureRmKey: 'terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: 'Terraform Validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: $(working_directory)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: $(working_directory)
              environmentServiceNameAzureRM: '$(AZURE_SERVICE_CONNECTION)'
              commandOptions: '-out=tfplan'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Terraform Plan'
            inputs:
              targetPath: '$(working_directory)/tfplan'
              artifact: 'terraform-plan'
              publishLocation: 'pipeline'

  - stage: BuildAndPush
    displayName: 'Build and Push Docker Image'
    dependsOn: TerraformValidate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        displayName: 'Build and Push to ACR'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Build and Push Docker Image to ACR'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az acr build \
                  --registry $(acr_name) \
                  --image $(docker_image_name):$(Build.BuildId) \
                  --image $(docker_image_name):latest \
                  --file ./Dockerfile \
                  ./src

  - stage: TerraformApply
    displayName: 'Apply Terraform Configuration'
    dependsOn: 
      - TerraformValidate
      - BuildAndPush
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: ApplyTerraform
        displayName: 'Terraform Apply'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@0
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: $(terraform_version)

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(working_directory)
                    backendServiceArm: '$(AZURE_SERVICE_CONNECTION)'
                    backendAzureRmResourceGroupName: '$(TF_STATE_RESOURCE_GROUP)'
                    backendAzureRmStorageAccountName: '$(TF_STATE_STORAGE_ACCOUNT)'
                    backendAzureRmContainerName: '$(TF_STATE_CONTAINER)'
                    backendAzureRmKey: 'terraform.tfstate'

                - task: TerraformTaskV4@4
                  displayName: 'Terraform Apply'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    workingDirectory: $(working_directory)
                    environmentServiceNameAzureRM: '$(AZURE_SERVICE_CONNECTION)'
                    commandOptions: '-auto-approve'

  - stage: Deploy
    displayName: 'Deploy to App Service'
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - deployment: DeployApp
        displayName: 'Deploy to App Service'
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: 'Restart App Service'
                  inputs:
                    azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      cd infra/terraform
                      APP_NAME=$(terraform output -raw app_service_name)
                      RG_NAME=$(terraform output -raw resource_group_name)
                      az webapp restart --name $APP_NAME --resource-group $RG_NAME
